# docspell-joex.conf — multi-language OCR override (v2)
#
# Mounted at /opt/docspell-joex/conf/docspell-joex.conf via docker-compose
# volume. When config.file system property points to an EXISTING file,
# Docspell's ConfigFactory.default switches from EnvConfig (custom env-var
# mapping) to Typesafe Config's ConfigSource.default — which does NOT
# auto-include env vars with the same naming conventions.
#
# Workaround: explicitly bind every docker-compose env var via Typesafe
# Config's ${?VAR} substitution syntax (use env var if set, else fall
# through to reference.conf default).
#
# Plus our actual goal: override the 3 tesseract command args lists to
# always pass `-l bul+eng+rus` regardless of Docspell collective language
# (Bulgarian is not in Docspell v0.43.0's Language enum).

docspell.joex {

  # ============================================================
  # SECTION 1: mirror docker-compose env vars
  # (because EnvConfig is bypassed when config.file exists)
  # ============================================================

  app-id = ${?DOCSPELL_JOEX_APP__ID}

  periodic-scheduler.name = ${?DOCSPELL_JOEX_PERIODIC__SCHEDULER_NAME}
  scheduler.name = ${?DOCSPELL_JOEX_SCHEDULER_NAME}

  base-url = ${?DOCSPELL_JOEX_BASE__URL}

  bind.address = ${?DOCSPELL_JOEX_BIND_ADDRESS}

  full-text-search {
    enabled = ${?DOCSPELL_JOEX_FULL__TEXT__SEARCH_ENABLED}
    solr.url = ${?DOCSPELL_JOEX_FULL__TEXT__SEARCH_SOLR_URL}
  }

  jdbc {
    url = ${?DOCSPELL_JOEX_JDBC_URL}
    user = ${?DOCSPELL_JOEX_JDBC_USER}
    password = ${?DOCSPELL_JOEX_JDBC_PASSWORD}
  }

  addons.executor-config.runner = ${?DOCSPELL_JOEX_ADDONS_EXECUTOR__CONFIG_RUNNER}

  convert.html-converter = ${?DOCSPELL_JOEX_CONVERT_HTML__CONVERTER}

  # ============================================================
  # SECTION 2: the actual OCR override
  # Force tesseract to always use bul+eng+rus, bypassing the
  # {{lang}} template which would otherwise be substituted with
  # Docspell's collective language code.
  # ============================================================

  extraction.ocr.tesseract.command {
    program = "tesseract"
    args = [
      "{{file}}",
      "stdout",
      "-l",
      "bul+eng+rus"
    ]
    timeout = "5 minutes"
  }

  # convert.tesseract: image → PDF. Replace args entirely to skip
  # the arg-mappings indirection.
  convert.tesseract.command {
    program = "tesseract"
    args = [
      "{{infile}}",
      "out",
      "-l",
      "bul+eng+rus",
      "pdf",
      "txt"
    ]
    timeout = "5 minutes"
  }

  # convert.ocrmypdf: PDF → PDF/A with text layer. Replace args
  # entirely, hardcoding -l flag.
  convert.ocrmypdf.command {
    program = "ocrmypdf"
    args = [
      "-l",
      "bul+eng+rus",
      "--skip-text",
      "--deskew",
      "-j", "1",
      "{{infile}}",
      "{{outfile}}"
    ]
    timeout = "5 minutes"
  }
}
